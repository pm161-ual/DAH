<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-toolbar class="custom-header">
      <div class="header-content">
        <h1 class="header-title">Products</h1>
      </div>
      <ion-buttons slot="end">
        <ion-button (click)="logout()">Log out</ion-button>
        <ion-icon aria-hidden="true" name="log-out-outline" size="large" color="secondary"></ion-icon>
      </ion-buttons>
  </ion-toolbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Product</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      <ion-col size="6" size-md="4" size-lg="3" *ngFor="let product of products">
        <ion-card>
          <img *ngIf="product.image" [src]="product.image" />
          <ion-card-header>
            <ion-card-title>{{ product.name }}</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <p *ngIf="product.description">{{ product.description }}</p>
            <h2>{{ product.price | currency:'USD':'symbol':'1.2-2' }}</h2>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
